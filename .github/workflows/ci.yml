name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain report
        run: |
          swift --version
          ls /Applications | grep -i xcode || true

      # The gate is enforcement, not prose: no personal identifier or private
      # path may ever enter the public tree — a PR that trips it fails here.
      - name: Secret-scan gate
        run: bash Scripts/secret-scan.sh

      - name: Build (release)
        run: swift build -c release

      - name: Test
        timeout-minutes: 10
        # --disable-sandbox: SwiftPM's build sandbox exists to contain untrusted
        # package plugins/build tools, not our own first-party test suite. Under
        # it, the runner silently SIGKILLs the test process during L-001's
        # ancestor filesystem walk (a message-less ~16ms death that never
        # reproduced under a dev machine's looser profile). This is the exact
        # command that passes locally; the secret-scan + build steps above are
        # the real supply-chain gate.
        run: swift test --disable-sandbox
