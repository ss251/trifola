name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain report
        run: |
          swift --version
          ls /Applications | grep -i xcode || true

      # The gate is enforcement, not prose: no personal identifier or private
      # path may ever enter the public tree — a PR that trips it fails here.
      - name: Secret-scan gate
        run: bash Scripts/secret-scan.sh

      - name: Build (release)
        run: swift build -c release

      - name: Test
        timeout-minutes: 12
        run: |
          set +e
          swift test 2>&1 | tee test-output.log
          EC=${PIPESTATUS[0]}
          echo "$EC" > swift-test-exit.code
          [ "$EC" = "0" ]

      # Insurance for the runner-only OOM this project spent many rounds pinning
      # down: an unbounded ancestor walk in discoverPolicies that converged on
      # Swift 6.3 but ballooned to ~42 GB on the runner's Swift 6.1.2 and was
      # jetsam-killed (message-less, no crash report). Now bounded. This runs
      # ONLY on failure and names the signal + any kernel OOM kill, so a
      # regression is diagnosed in one round instead of ten.
      - name: Failure diagnostics
        if: failure()
        run: |
          echo "raw exit: $(cat swift-test-exit.code 2>/dev/null || echo '?')  (137=SIGKILL 134=SIGABRT 139=SIGSEGV)"
          echo "=== kernel jetsam / OOM kills (last 20m) ==="
          log show --last 20m --predicate 'eventMessage CONTAINS[c] "jetsam" OR eventMessage CONTAINS[c] "killing largest"' --style compact 2>/dev/null | tail -30 || echo "(log show unavailable)"
          echo "=== crash reports ==="
          ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null || echo "(none)"
