name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain report
        run: |
          swift --version
          ls /Applications | grep -i xcode || true

      # The gate is enforcement, not prose: no personal identifier or private
      # path may ever enter the public tree — a PR that trips it fails here.
      - name: Secret-scan gate
        run: bash Scripts/secret-scan.sh

      - name: Build (release)
        run: swift build -c release

      - name: Test
        timeout-minutes: 10
        # swift-testing runs parallel by default; the standard runner has a
        # fraction of a dev machine's RAM, and the parallel fixture load was
        # dying with no verdict (~2min, no crash, no summary). Serial trades a
        # little wall-time for a bounded memory footprint and a legible log
        # where the last-started test is unambiguously any future culprit.
        run: swift test --no-parallel
