name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain report
        run: |
          swift --version
          ls /Applications | grep -i xcode || true

      # The gate is enforcement, not prose: no personal identifier or private
      # path may ever enter the public tree — a PR that trips it fails here.
      - name: Secret-scan gate
        run: bash Scripts/secret-scan.sh

      - name: Build (release)
        run: swift build -c release

      - name: Test
        timeout-minutes: 15
        shell: bash
        # The two ungated real-I/O tests (loopback TCP connect + real
        # Keychain/network quota fetch) are now CI-gated like ProbePrimitives
        # and the CLI test, so this run should stay hermetic. The side-channel
        # sampler + raw-exit capture remain so that IF the process still dies,
        # the log shows the resource curve and the exact signal (137=SIGKILL,
        # etc.) instead of a message-less "exit code 1".
        env:
          SWIFT_BACKTRACE: enable=yes,symbolicate=full,interactive=no
        run: |
          # Sample RSS / thread-count / swap of the test process to a FILE (not
          # the buffered test stream) every 3s, so the curve survives even a
          # SIGKILL that leaves stdout unflushed — the one thing the buffered
          # runner log cannot show.
          (
            while true; do
              ts=$(date +%H:%M:%S)
              pid=$(pgrep -f 'xctest|TrifolaPackageTests|swiftpm-testing-helper|\.build/debug/.*[Tt]est' | head -1)
              if [ -n "$pid" ]; then
                rss=$(ps -o rss= -p "$pid" 2>/dev/null | tr -d ' ')
                thr=$(ps -M -p "$pid" 2>/dev/null | grep -c .)
                echo "[$ts] pid=$pid rssKB=${rss:-?} threads~=${thr:-?}"
              else
                echo "[$ts] (no test process)"
              fi
              vm_stat 2>/dev/null | grep -Ei 'Pageout|Compressor occupied|Swapout' | tr '\n' ' ' | sed 's/^/          vm: /'
              echo
              sleep 3
            done
          ) > sampler.log 2>&1 &
          SAMPLER=$!
          set +e
          swift test --no-parallel --disable-sandbox 2>&1 | tee test-output.log
          EC=${PIPESTATUS[0]}
          set -e
          kill "$SAMPLER" 2>/dev/null || true
          echo "$EC" > swift-test-exit.code
          echo "SWIFT_TEST_RAW_EXIT=$EC  (137=SIGKILL 134=SIGABRT 139=SIGSEGV 143=SIGTERM)"
          exit "$EC"

      # Turns a non-reproducible runner-only death into a real diagnosis: the
      # raw exit signal, the resource curve over the whole run, kernel kill /
      # jetsam events, and any crash reports macOS writes on a catchable signal.
      # Runs even when the test step fails.
      - name: Crash diagnostics
        if: always()
        shell: bash
        run: |
          echo "===== swift test raw exit ====="
          echo "raw exit: $(cat swift-test-exit.code 2>/dev/null || echo '?')  (137=SIGKILL 134=SIGABRT 139=SIGSEGV 143=SIGTERM)"
          echo "===== runner resources ====="
          echo "-- disk --";   df -h /
          echo "-- ulimit --"; ulimit -a
          echo "-- cpu/mem --"; sysctl hw.ncpu hw.memsize 2>/dev/null || true
          echo "===== resource sampler (RSS / threads / swap over the run) ====="
          tail -180 sampler.log 2>/dev/null || echo "(no sampler.log)"
          echo "===== last 60 lines of the test stream ====="
          tail -60 test-output.log 2>/dev/null || echo "(no test-output.log)"
          echo "===== crash / resource markers in the stream ====="
          grep -nE 'Fatal error|Precondition|Crashed|crashed|received signal|SIG[A-Z]+|No space left|Killed|abort|Trace/BPT' test-output.log 2>/dev/null | tail -40 || true
          echo "===== kernel kill / jetsam / memorystatus / thread-limit events ====="
          log show --last 25m --predicate 'eventMessage CONTAINS[c] "jetsam" OR eventMessage CONTAINS[c] "memorystatus" OR eventMessage CONTAINS[c] "low swap" OR eventMessage CONTAINS[c] "lowswap" OR eventMessage CONTAINS[c] "thread_create" OR (eventMessage CONTAINS[c] "kill" AND (eventMessage CONTAINS[c] "swift" OR eventMessage CONTAINS[c] "xctest" OR eventMessage CONTAINS[c] "Trifola"))' --style compact 2>/dev/null | tail -80 || echo "(log show unavailable)"
          echo "===== macOS crash reports (full symbolicated backtraces) ====="
          ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null || echo "(DiagnosticReports empty or absent)"
          for f in ~/Library/Logs/DiagnosticReports/*.ips ~/Library/Logs/DiagnosticReports/*.crash; do
            [ -e "$f" ] || continue
            echo "----- $f -----"
            cat "$f"
          done
